<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" fill="#05050f"/>
  <!-- Hexagon -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glow)"/>
  <!-- Inner hex -->
  <polygon points="32,12 50,22 50,42 32,52 14,42 14,22" fill="none" stroke="#ff0080" stroke-width="1" opacity="0.6"/>
  <!-- AI text -->
  <text x="32" y="38" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="18" fill="#00ffff" filter="url(#glow)">AI</text>
</svg>
